name: strix-penetration-test

on:
  workflow_dispatch:
    inputs:
      url:
        description: "输入"
        required: true
        default: "默认"

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Strix
        run: curl -sSL https://strix.ai/install | bash

      - name: Run Strix
        env:
          STRIX_LLM: ${{ secrets.STRIX_LLM }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_BASE: ${{ secrets.LLM_API_BASE }}

        run: strix -n --target ${{ github.event.inputs.url }}

      - name: Upload strix_runs directory
        uses: actions/upload-artifact@v4
        with:
          name: strix-runs # 下载时的压缩包文件名（下载后叫 strix-runs-artifact.zip）
          path: ./strix_runs        # 你想要打包的目录路径（支持相对路径）
          retention-days: 5  
